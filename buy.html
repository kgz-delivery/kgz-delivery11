    // Получение ID товара из URL
    function getProductIdFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id');
    }

function orderViaWhatsApp(productId) {
    const product = products[productId];
    if (!product) {
        alert('Товар не найден');
        return;
    }
    
    const phoneNumber = "996556024449";
    
    let message = `Заказ: ${product.name}\n`;
    message += `Цена: ${product.price.toLocaleString()} Сом\n`;
    
    // характеристики
    if (product.specs["Процессор"]) message += `Процессор: ${product.specs["Процессор"]}\n`;
    if (product.specs["Видеокарта"]) message += `Видеокарта: ${product.specs["Видеокарта"]}\n`;
    if (product.specs["Оперативная память"]) message += `Память: ${product.specs["Оперативная память"]}\n`;
    
    message += `\nСвяжитесь для заказа`;
    
    const encodedMessage = encodeURIComponent(message);
    const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
    
    window.open(whatsappUrl, '_blank');
}

    function loadProductDetails() {
        const productId = getProductIdFromURL();
        const product = products[productId];
        const productDetail = document.getElementById('productDetail');
        
        if (!product) {
            productDetail.innerHTML = '<p style="padding:2rem;text-align:center;color:var(--muted-light);">Товар не найден. <a href="index.html" style="color:var(--purple-bright);">Вернуться в каталог</a>.</p>';
            if (window.CyberSpaceReveal) window.CyberSpaceReveal.refresh();
            return;
        }
        
        let priceHTML = `<div class="product-price">${product.price.toLocaleString()} Сом</div>`;
        if (product.oldPrice) {
            priceHTML = `
                <div class="product-price">
                    <span class="old-price">${product.oldPrice.toLocaleString()} Сом</span>
                    ${product.price.toLocaleString()} Сом
                </div>
            `;
        }
        
        let specsHTML = '';
        for (const [key, value] of Object.entries(product.specs)) {
            specsHTML += `
                <li>
                    <span class="spec-label">${key}:</span>
                    <span class="spec-value">${value}</span>
                </li>
            `;
        }
        
        productDetail.innerHTML = `
            <div class="product-image">
                <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/500x400/2a2a2a/1d4ed8?text=CYBER+SPACE'">
            </div>
            <div class="product-info">
                <h1 class="product-title">${product.name}</h1>
                ${priceHTML}
                
                <div class="product-specs">
                    <h3>Характеристики:</h3>
                    <ul class="specs-list">
                        ${specsHTML}
                    </ul>
                </div>
                
                <div class="product-description">${product.description}</div>
                
                <div class="order-section">
			<button type="button" class="order-btn" onclick="orderViaWhatsApp(${product.id})">
				<span class="btn-icon" aria-hidden="true">
					<img src="imgs/btnlogo.png" alt="" width="22" height="22">
				</span>
				<span class="order-btn-label">Заказать в WhatsApp</span>
			</button>

                    <p style="margin-top: 1rem; color: var(--muted); font-size: 0.88rem;">Доставка по Кыргызстану. Гарантия 12 месяцев.</p>
                </div>
            </div>
        `;
        
        document.title = `CYBER SPACE — ${product.name}`;

        var imageEl = productDetail.querySelector('.product-image');
        var infoEl = productDetail.querySelector('.product-info');
        if (imageEl) imageEl.classList.add('reveal');
        if (infoEl) infoEl.classList.add('reveal');
        if (window.CyberSpaceReveal) window.CyberSpaceReveal.refresh();
    }

    const buyHeader = document.getElementById('buyHeader');
    if (buyHeader) {
        window.addEventListener('scroll', () => {
            if (window.scrollY > 24) buyHeader.classList.add('is-scrolled');
            else buyHeader.classList.remove('is-scrolled');
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadProductDetails();
    });
